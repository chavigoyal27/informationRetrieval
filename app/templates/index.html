<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Opinions Search Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <a href="/" class="logo">AI Opinions</a>
        <form action="/search" method="GET" class="search-bar-unified">
            <div class="search-row">
                <input type="text" name="q" placeholder="Search opinions about AI..." autofocus>
                <button type="submit" aria-label="Search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
            </div>
            <div class="filters-row">
                <div class="filter-inline-group">
                    <span class="filter-inline-label">Sources:</span>
                    <label><input type="checkbox" name="source" value="Reddit"> Reddit</label>
                    <label><input type="checkbox" name="source" value="YouTube"> YouTube</label>
                    <label><input type="checkbox" name="source" value="Twitter"> Twitter</label>
                    <label><input type="checkbox" name="source" value="Quora"> Quora</label>
                    <label><input type="checkbox" name="source" value="LinkedIn"> LinkedIn</label>
                </div>
                <span class="filter-separator"></span>
                <div class="filter-inline-group">
                    <span class="filter-inline-label">Sentiment:</span>
                    <select name="sentiment">
                        <option value="">All</option>
                        <option value="positive">Positive</option>
                        <option value="negative">Negative</option>
                        <option value="neutral">Neutral</option>
                    </select>
                </div>
                <span class="filter-separator"></span>
                <div class="filter-inline-group">
                    <span class="filter-inline-label">Emotion:</span>
                    <select name="emotion">
                        <option value="">All</option>
                        <option value="excitement">Excitement</option>
                        <option value="concern">Concern</option>
                        <option value="anger">Anger</option>
                        <option value="neutral">Neutral</option>
                    </select>
                </div>
                <span class="filter-separator"></span>
                <div class="filter-inline-group">
                    <span class="filter-inline-label">From:</span>
                    <input type="date" name="date_from">
                    <span class="filter-inline-label">To:</span>
                    <input type="date" name="date_to">
                </div>
            </div>
        </form>
    </header>

    <div class="landing-body">
        <h1>AI Opinions Search Engine</h1>
        <p class="subtitle">Search 28,664 opinions about AI from Reddit, YouTube, Twitter, and Quora</p>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}


        <div class="landing-suggestions">
            <h3 class="suggestions-title">Try searching for</h3>
            <div class="suggestions-list">
                <a href="/search?q=Harmful+effects+of+chatgpt" class="suggestion-chip">Harmful effects of chatgpt</a>
                <a href="/search?q=Classroom+AI" class="suggestion-chip">Classroom AI</a>
                <a href="/search?q=AI+in+education+ethics" class="suggestion-chip">AI in education ethics</a>
            </div>
        </div>
    </div>

</body>
</html>
